<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蔡欣淇 | 个人学习主页</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 个人信息头部（和截图风格一致） -->
        <div class="header">
            <h1>蔡欣淇</h1>
            <p>广东科学技术职业学院 · 商务数据分析与应用专业</p >
            <p>个人课程学习作品集</p >
        </div>

        <!-- 课程卡片区域（深色风格） -->
        <div class="course-grid">
            <div class="course-card" onclick="location.href='courses/python.html'">
                <h3>Python基础</h3>
                <p>Python语法、基础编程、在线代码练习</p >
            </div>

            <div class="course-card" onclick="location.href='courses/data-analytics.html'">
                <h3>数据分析技术</h3>
                <p>数据清洗、统计分析、可视化实操</p >
            </div>

            <div class="course-card" onclick="location.href='courses/supply-data.html'">
                <h3>供应链数据分析</h3>
                <p>供应链指标、数据建模与分析</p >
            </div>

            <div class="course-card" onclick="location.href='courses/database.html'">
                <h3>数据库原理与应用</h3>
                <p>SQL语句、数据表操作、数据库设计</p >
            </div>

            <div class="course-card" onclick="location.href='courses/finance-data.html'">
                <h3>金融交易数据集</h3>
                <p>金融数据处理、交易指标分析</p >
            </div>

            <div class="course-card" onclick="location.href='courses/e-commerce.html'">
                <h3>电商运营数据集</h3>
                <p>电商流量、订单、用户数据分析</p >
            </div>

            <div class="course-card" onclick="location.href='courses/supply-logistics.html'">
                <h3>供应链物流数据集</h3>
                <p>物流时效、仓储、运输数据分析</p >
            </div>

            <div class="course-card" onclick="location.href='courses/recruit-data.html'">
                <h3>招聘网站数据集</h3>
                <p>岗位数据、薪资、行业数据分析</p >
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
